<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
<form>
    <h1>Registration Form</h1>
    <div>
        <label for="first_name">First Name *</label>
        <input type="text" name="first_name" id="first_name">
    </div>
    <div>
        <label for="last_name">Last Name *</label>
        <input type="text" name="last_name" id="last_name">
    </div>
    <div>
        <label for="email_address">Email Address *</label>
        <input type="email" name="email" id="email_address">
    </div>
    <div>
        <label for="password">Password *</label>
        <input type="password" name="password" id="password">
    </div>
    <div>
        <label for="confirm">Confirm Password *</label>
        <input type="password" name="password" id="confirm">
    </div>
    <div>
        <label for="birthday">Birthday</label>
        <input type="date" name="birthday" id="birthday">
    </div>
        <p>Gender Identity:</p>
        <input type="radio" name="male" id="male">
        <label for="male">Male</label>
        <input type="radio" name="female" id="female">
        <label for="female">Female</label>
        <input type="radio" name="Non-binary" id="nb">
        <label for="nb">Non-binary</label>
        <input type="radio" name="pfna" id="pfna">
        <label for="nb">I prefer not to answer</label>
    </div>
    <div>
        <label for="description">A short description about myself:</label>
        <textarea name="description" id="description" cols="15" rows="3"></textarea>
    </div>
    <div>
        <label for="fav_lang">Favorite Language</label>
        <select name="fav_lang" id="fav_lang">
            <option value="Javascript">Javascript</option>
            <option value="Python">Python</option>
            <option value="C#">C#</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <div>
        <label for="updates_checkbox">Yes, I would like to receive periodic email updates</label>
        <input type="checkbox" name="updates_checkbox" id="updates_checkbox">
    </div>
    <input type="submit" value="Create Account">
    <p>* Indicates a required field</p>
</form>
</body>
</html>
